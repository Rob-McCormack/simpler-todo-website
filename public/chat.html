<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat — SimplerToDo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 36rem;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #log {
            min-height: 12rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        form {
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            padding: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
        }

        #err {
            color: #c00;
            margin-top: 0.75rem;
        }
    </style>
</head>

<body>
    <p><a href="/">← Home</a></p>
    <h1>Chat</h1>
    <div id="log"></div>
    <form id="f">
        <input id="msg" type="text" placeholder="Type a message…" autocomplete="off" />
        <button type="submit">Send</button>
    </form>
    <p id="err"></p>
    <p style="font-size:0.8rem;color:#666;margin-top:1rem">Uses POST JSON first; if the edge returns HTML (e.g. WAF 502), retries GET with <code>X-Chat-B</code> (base64url) so the URL stays short. Don’t paste secrets.</p>

    <script>
        function utf8ToB64Url(s) {
            var u8 = new TextEncoder().encode(s);
            var bin = '';
            for (var i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
            return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }
        function looksLikeHtml(s) {
            var t = (s || '').trimStart().slice(0, 20).toLowerCase();
            return t.indexOf('<!doctype') === 0 || t.indexOf('<html') === 0;
        }
        var log = document.getElementById('log');
        var err = document.getElementById('err');
        document.getElementById('f').addEventListener('submit', async function (e) {
            e.preventDefault();
            err.textContent = '';
            var input = document.getElementById('msg');
            var text = (input.value || '').trim();
            if (!text) return;
            input.value = '';
            log.textContent += 'You: ' + text + '\n\n';
            try {
                if (text.length > 2000) {
                    err.textContent = 'Message too long (max 2000 characters).';
                    return;
                }
                var postRes = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                    mode: 'same-origin',
                });
                var raw = await postRes.text();
                if (postRes.status === 502 || looksLikeHtml(raw)) {
                    var b = utf8ToB64Url(text);
                    var getRes = await fetch('/api/v1/chat', {
                        method: 'GET',
                        headers: { 'X-Chat-B': b },
                        mode: 'same-origin',
                    });
                    raw = await getRes.text();
                    postRes = getRes;
                }
                var data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (parseErr) {
                    err.textContent = 'HTTP ' + postRes.status + ' — not JSON (often a Cloudflare error). First chars: ' + (raw || '').slice(0, 120);
                    return;
                }
                if (!postRes.ok) {
                    err.textContent = data.error || ('HTTP ' + postRes.status);
                    return;
                }
                log.textContent += 'Assistant: ' + (data.answer || '') + '\n\n';
            } catch (x) {
                err.textContent = x.message || 'Request failed';
            }
        });
    </script>
</body>

</html>
