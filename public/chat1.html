<!DOCTYPE html>
<html lang="en" data-chat-api="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Chat</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }

        #chat-box {
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .user {
            color: blue;
            margin-bottom: 5px;
        }

        .ai {
            color: green;
            margin-bottom: 10px;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            padding: 8px;
        }
    </style>
</head>

<body>
    <p><a href="/">← Home</a> · <a href="/chat.html">Other chat</a></p>
    <h2>Chat with Claude</h2>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button type="button" onclick="sendMessage()">Send</button>
    </div>

    <script>
        function apiBase() {
            var a = (document.documentElement.getAttribute('data-chat-api') || '').trim();
            if (a.endsWith('/')) a = a.slice(0, -1);
            return a;
        }

        function appendLine(className, label, text, color) {
            var box = document.getElementById('chat-box');
            var div = document.createElement('div');
            div.className = className;
            if (color) div.style.color = color;
            var b = document.createElement('b');
            b.textContent = label;
            div.appendChild(b);
            div.appendChild(document.createTextNode(text));
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            var input = document.getElementById('user-input');
            var userMsg = (input.value || '').trim();
            if (!userMsg) return;

            appendLine('user', 'You: ', userMsg);
            input.value = '';

            var base = apiBase();
            var mode = base ? 'cors' : 'same-origin';
            var url = (base || '') + '/api/v1/chat';

            try {
                var response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg }),
                    mode: mode,
                });
                var raw = await response.text();
                var data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (e) {
                    appendLine('ai', 'Error: ', 'Not JSON (often Cloudflare WAF). First chars: ' + raw.slice(0, 120), 'red');
                    return;
                }
                if (!response.ok) {
                    appendLine('ai', 'Error: ', data.error || ('HTTP ' + response.status), 'red');
                    return;
                }
                appendLine('ai', 'Claude: ', data.answer || '(empty)');
            } catch (err) {
                appendLine('ai', 'Error: ', err.message || 'Could not reach API.', 'red');
            }
        }

        document.getElementById('user-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
