# Cloudflare Pages — https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# Account "Secrets Store" (dash → Secrets Store) is NOT the same as Pages Function secrets.
# Pages wrangler does not document secrets_store_secrets; that binding is for Workers. Your
# Functions read env.ANTHROPIC_API_KEY as a string from **this Pages project**:
#
#   • Dashboard: Workers & Pages → this project → Settings → Variables and Secrets
#     → Production → Add → name ANTHROPIC_API_KEY → Encrypt → paste API key → Save → redeploy.
#   • Or CLI: npx wrangler pages secret put ANTHROPIC_API_KEY --project-name=simpler-todo-website
#
# KV (recommended): 5/day rate limit per IP. Create: Workers & Pages → KV → Create namespace.
# Copy the namespace ID, uncomment below, paste id, commit, deploy.
# [[kv_namespaces]]
# binding = "HELP_RATE_LIMIT"
# id = "paste-your-kv-namespace-id-here"

name = "simpler-todo-website"
pages_build_output_dir = "."
compatibility_date = "2025-03-01"
