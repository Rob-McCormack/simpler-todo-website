# Cloudflare Pages — build output is this directory (static + functions/).
# Do NOT put placeholder KV IDs here; deploy will fail validation.
#
# Production: Pages → your project → Settings → Functions:
#   - KV namespace: create one, bind as HELP_RATE_LIMIT (same name as in functions/api/help.js)
#   - Variables/secrets: ANTHROPIC_API_KEY (and optional ANTHROPIC_MODEL)
#
# Local: npx wrangler pages dev .
# Optional: add [[kv_namespaces]] below only after you have a real namespace id from the dashboard.

name = "simpler-todo-website"
pages_build_output_dir = "."
compatibility_date = "2025-03-01"
